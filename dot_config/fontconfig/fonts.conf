<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- 1. SANS-SERIF: Liberation Sans first, then Noto Sans CJK SC -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Liberation Sans</string>
      <string>微软雅黑</string> <!-- Add this -->
    </edit>
  </match>

  <!-- 2. SERIF: Liberation Serif first, then Noto Serif CJK SC -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Liberation Serif</string>
      <string>霞鹭文楷</string> <!-- Add this -->
    </edit>
  </match>

  <!-- 3. MONOSPACE: CaskaydiaMono first, then Noto Sans Mono CJK SC -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>CaskaydiaMono Nerd Font</string>
      <string>霞鹭文楷等宽</string> <!-- Add this -->
    </edit>
  </match>

  <!-- 4. Global Language Override (Ensures Noto wins for Chinese) -->
  <match target="pattern">
    <test name="lang">
      <string>zh-cn</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>霞鹭文楷</string>
    </edit>
  </match>

  <!-- UI Aliases -->
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias>
    <family>ui-monospace</family>
    <default><family>monospace</family></default>
  </alias>

</fontconfig>
